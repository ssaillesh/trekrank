# XcodeGen spec. Generate the Xcode project with:  xcodegen generate
# (install via `brew install xcodegen`). Then open TrekRank.xcodeproj.
# Alternatively: create a new iOS App (SwiftUI) in Xcode and drag the
# TrekRank/ source folder in.
name: TrekRank
options:
  bundleIdPrefix: app.trekrank
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_NSAppTransportSecurity: # allow http://localhost in dev
targets:
  TrekRank:
    type: application
    platform: iOS
    sources:
      - path: TrekRank
    info:
      path: TrekRank/Info.plist
      properties:
        CFBundleDisplayName: TrekRank
        UILaunchScreen: {}
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.trekrank.ios
        TARGETED_DEVICE_FAMILY: "1,2"
