name: Keep API warm

on:
  schedule:
    # Every 10 minutes — comfortably inside Render free tier's ~15min idle
    # spin-down window, so /health never has to cold-start a real user.
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 https://trekrank.onrender.com/health)
          echo "status: $status"
          if [ "$status" != "200" ]; then
            echo "::warning::Health check returned $status"
          fi
