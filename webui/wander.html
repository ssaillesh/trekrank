<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Wander — your night, planned</title>
<meta name="description" content="Tell me your budget and your vibe — I'll plan a real itinerary of places near you, from dinner to drinks to the dessert you didn't know you needed." />
<meta name="theme-color" content="#0b0f1e" />
<link rel="preconnect" href="https://unpkg.com" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/config.js"></script>
<style>
  :root{
    --accent:#5eebd4; --accent2:#8a7bff; --hot:#ff7a9c;
    --bg0:#0b0f1e; --bg1:#111731; --bg2:#161d3d;
    --card:rgba(255,255,255,.05); --card-2:rgba(22,29,61,.9); --brd:rgba(255,255,255,.09); --hair:rgba(255,255,255,.06);
    --text:#eef2ff; --muted:#9fb0d6; --muted2:#6b7aa6;
    --shadow:0 24px 70px -18px rgba(0,0,0,.7);
    --ease:cubic-bezier(.22,1,.36,1);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{background:
      radial-gradient(1100px 620px at 80% -8%, rgba(138,123,255,.16), transparent 60%),
      radial-gradient(900px 560px at 8% 108%, rgba(94,235,212,.12), transparent 55%),
      var(--bg0);
    color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Inter,sans-serif;
    -webkit-font-smoothing:antialiased; line-height:1.5; display:flex; flex-direction:column; height:100vh;}
  a{color:inherit; text-decoration:none;}
  .grad{background:linear-gradient(110deg,var(--accent),var(--accent2)); -webkit-background-clip:text; background-clip:text; color:transparent;}

  header{display:flex; align-items:center; gap:10px; padding:16px 20px; border-bottom:1px solid var(--hair);
    position:sticky; top:0; backdrop-filter:blur(14px); z-index:10;}
  .logo{font-weight:850; letter-spacing:-.02em; font-size:20px;}
  .logo .m{display:inline-block; margin-right:6px;}
  header .tag{font-size:12.5px; color:var(--muted2); margin-left:2px;}
  .loc{margin-left:auto; font-size:12px; color:var(--muted); display:flex; align-items:center; gap:7px;
    background:var(--card); border:1px solid var(--brd); padding:7px 12px; border-radius:999px;}
  .loc .dot{width:8px; height:8px; border-radius:50%; background:var(--muted2);}
  .loc.on .dot{background:var(--accent); box-shadow:0 0 8px var(--accent);}

  .chat{flex:1; overflow-y:auto; padding:24px 16px 8px;}
  .thread{max-width:720px; margin:0 auto; display:flex; flex-direction:column; gap:16px;}

  .msg{display:flex; gap:10px; max-width:88%;}
  .msg .av{width:30px; height:30px; border-radius:50%; flex:0 0 auto; display:grid; place-items:center; font-size:15px;
    background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#04211b; font-weight:800;}
  .bubble{padding:12px 15px; border-radius:16px; font-size:15px;}
  .msg.bot .bubble{background:var(--card-2); border:1px solid var(--brd); border-top-left-radius:5px;}
  .msg.me{align-self:flex-end; flex-direction:row-reverse;}
  .msg.me .av{background:linear-gradient(135deg,#2a355f,#3a2a6b); color:#cfe;}
  .msg.me .bubble{background:linear-gradient(180deg,var(--accent),#39c9b3); color:#04211b; font-weight:600; border-top-right-radius:5px;}

  .quick{display:flex; flex-wrap:wrap; gap:8px; margin:2px 0 4px 40px;}
  .chip{border:1px solid var(--brd); background:var(--card); color:var(--text); font-size:13.5px; font-weight:650;
    padding:9px 15px; border-radius:999px; cursor:pointer; transition:.18s var(--ease);}
  .chip:hover{border-color:var(--accent); color:var(--accent); transform:translateY(-1px);}

  /* itinerary card */
  .itin{margin-left:40px; background:var(--card-2); border:1px solid var(--brd); border-radius:20px; overflow:hidden;
    box-shadow:var(--shadow); animation:rise .5s var(--ease) both;}
  @keyframes rise{from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:none;}}
  .itin .map{height:200px; background:var(--bg2);}
  .itin .sum{display:flex; gap:14px; padding:14px 18px; border-bottom:1px solid var(--hair); font-size:13px; color:var(--muted); flex-wrap:wrap;}
  .itin .sum b{color:var(--text);}
  .stops{padding:6px 10px 12px;}
  .stop{display:flex; gap:13px; padding:13px 12px; border-radius:14px; position:relative;}
  .stop:not(:last-child)::after{content:""; position:absolute; left:29px; top:44px; bottom:-2px; width:2px;
    background:linear-gradient(var(--brd),transparent);}
  .stop .num{width:34px; height:34px; flex:0 0 auto; border-radius:50%; display:grid; place-items:center; font-size:16px;
    background:rgba(94,235,212,.14); border:1px solid var(--brd); z-index:1;}
  .stop .body{flex:1; min-width:0;}
  .stop .top{display:flex; align-items:baseline; gap:8px; flex-wrap:wrap;}
  .stop .time{font-size:11px; font-weight:800; color:#04211b; background:var(--accent); padding:2px 8px; border-radius:999px;}
  .stop .lbl{font-size:11px; font-weight:800; letter-spacing:.05em; text-transform:uppercase; color:var(--accent);}
  .itin .tip{margin:2px 12px 14px; padding:12px 14px; border-radius:14px; font-size:13.5px; color:var(--text);
    background:linear-gradient(180deg,rgba(138,123,255,.14),rgba(94,235,212,.08)); border:1px solid var(--brd);}
  .events{margin:0 12px 14px;}
  .ev-h{font-size:11px; font-weight:800; letter-spacing:.06em; text-transform:uppercase; color:var(--hot); margin:4px 0 8px;}
  .ev{display:flex; align-items:center; gap:10px; padding:11px 13px; border-radius:12px; margin-bottom:8px;
    background:rgba(255,122,156,.08); border:1px solid rgba(255,122,156,.22); transition:.15s;}
  .ev:hover{background:rgba(255,122,156,.14);}
  .ev-body{flex:1; min-width:0;} .ev-body b{font-size:14px; display:block;}
  .ev-meta{font-size:12px; color:var(--muted2);}
  .ev-price{font-size:12px; font-weight:700; color:var(--text);}
  .ev-go{font-size:12px; font-weight:800; color:var(--hot); white-space:nowrap;}
  .stop h4{margin:2px 0; font-size:16px; font-weight:750; letter-spacing:-.01em;}
  .stop .meta{font-size:12.5px; color:var(--muted2); display:flex; gap:8px; flex-wrap:wrap; align-items:center;}
  .stop .why{font-size:13.5px; color:var(--muted); margin-top:5px;}
  .stop .cost{margin-left:auto; font-weight:800; color:var(--text); font-size:14px; white-space:nowrap;}
  .pill{font-size:11px; font-weight:700; padding:2px 8px; border-radius:999px; background:rgba(255,255,255,.06);}
  .pill.star{color:#ffd166; background:rgba(255,209,102,.12);}
  .stop .acts{display:flex; gap:8px; margin-top:9px;}
  .stop .acts a{font-size:12px; font-weight:700; padding:6px 11px; border-radius:999px; border:1px solid var(--brd);
    background:var(--card); color:var(--text);}
  .stop .acts a:hover{border-color:var(--accent); color:var(--accent);}
  .itin .foot{padding:12px 18px 16px; display:flex; gap:10px; flex-wrap:wrap;}

  .typing{display:flex; gap:5px; padding:14px 16px;}
  .typing i{width:7px; height:7px; border-radius:50%; background:var(--muted2); animation:bl 1.2s infinite;}
  .typing i:nth-child(2){animation-delay:.2s;} .typing i:nth-child(3){animation-delay:.4s;}
  @keyframes bl{0%,60%,100%{opacity:.3; transform:translateY(0);} 30%{opacity:1; transform:translateY(-3px);}}

  .composer{border-top:1px solid var(--hair); padding:14px 16px calc(14px + env(safe-area-inset-bottom));
    background:rgba(11,15,30,.7); backdrop-filter:blur(14px);}
  .composer .row{max-width:720px; margin:0 auto; display:flex; gap:10px;}
  .composer input{flex:1; padding:14px 18px; border-radius:999px; border:1px solid var(--brd); background:var(--card);
    color:var(--text); font-size:15px; outline:none;}
  .composer input:focus{border-color:var(--accent);}
  .send{width:50px; flex:0 0 auto; border:0; border-radius:50%; cursor:pointer; font-size:18px;
    background:linear-gradient(180deg,var(--accent),#39c9b3); color:#04211b; transition:transform .15s var(--ease);}
  .send:hover{transform:scale(1.06);} .send:disabled{opacity:.5;}
  .num-marker{background:var(--accent); color:#04211b; width:26px; height:26px; border-radius:50%; border:2px solid #fff;
    display:grid; place-items:center; font-weight:800; font-size:13px; box-shadow:0 2px 8px rgba(0,0,0,.5);}
  .leaflet-container{background:var(--bg2);}

  .saved-btn{margin-left:auto; margin-right:10px; border:1px solid var(--brd); background:var(--card); color:var(--text);
    font-size:13px; font-weight:700; padding:7px 13px; border-radius:999px; cursor:pointer;}
  .saved-btn:hover{border-color:var(--accent); color:var(--accent);}
  header .loc{margin-left:0;}

  .day-head{margin:6px 0 -6px 40px; font-size:12px; font-weight:800; letter-spacing:.06em; text-transform:uppercase;
    color:var(--accent2);}
  .save-chip{border:1px solid var(--brd); background:var(--card); color:var(--text); font-size:13px; font-weight:700;
    padding:9px 15px; border-radius:999px; cursor:pointer;}
  .save-chip:hover{border-color:var(--accent); color:var(--accent);}
  .save-chip.done{color:var(--accent); border-color:var(--accent); background:rgba(94,235,212,.1);}

  .drawer-bg{position:fixed; inset:0; background:rgba(4,7,16,.6); backdrop-filter:blur(4px); z-index:40;}
  .drawer{position:fixed; top:0; right:0; bottom:0; width:min(380px,90vw); z-index:41; background:var(--bg1);
    border-left:1px solid var(--brd); box-shadow:var(--shadow); display:flex; flex-direction:column;
    transform:translateX(100%); transition:transform .35s var(--ease);}
  .drawer:not(.hidden){transform:translateX(0);}
  .drawer-head{display:flex; align-items:center; padding:18px 20px; border-bottom:1px solid var(--hair); font-size:16px;}
  .drawer-head .x{margin-left:auto; cursor:pointer; font-size:22px; color:var(--muted2);}
  .drawer-body{flex:1; overflow-y:auto; padding:14px;}
  .saved-item{background:var(--card); border:1px solid var(--brd); border-radius:14px; padding:14px; margin-bottom:10px; cursor:pointer;}
  .saved-item:hover{border-color:var(--accent);}
  .saved-item b{font-size:14.5px;} .saved-item .sub{font-size:12px; color:var(--muted2); margin-top:3px;}
  .saved-item .del{float:right; color:var(--muted2); font-size:15px;}
  .saved-item .del:hover{color:var(--hot);}
  .saved-empty{text-align:center; color:var(--muted2); padding:40px 10px; font-size:14px;}
  .hidden{display:none !important;}
  @media(max-width:560px){ .msg{max-width:96%;} .itin,.quick,.day-head{margin-left:0;} }
</style>
</head>
<body>
  <header>
    <div class="logo"><span class="m">🧭</span><span class="grad">Wander</span></div>
    <span class="tag">your night, planned</span>
    <button class="saved-btn" id="savedBtn" title="Saved plans">💾 <span id="savedCount">0</span></button>
    <div class="loc" id="locBadge"><span class="dot"></span><span id="locText">location off</span></div>
  </header>

  <!-- saved plans drawer -->
  <div class="drawer-bg hidden" id="savedBg"></div>
  <aside class="drawer hidden" id="savedDrawer">
    <div class="drawer-head"><b>Saved plans</b><span class="x" id="savedClose">×</span></div>
    <div class="drawer-body" id="savedList"></div>
  </aside>

  <div class="chat" id="chat"><div class="thread" id="thread"></div></div>

  <div class="composer">
    <div class="row">
      <input id="input" placeholder="e.g. I've got $100 for a chill date night" autocomplete="off" />
      <button class="send" id="send" title="Send">➤</button>
    </div>
  </div>

<script>
const API = window.API_BASE;
const $ = id => document.getElementById(id);
const esc = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const thread = $('thread'), chat = $('chat');
let messages = [];           // {role, content}
let userLoc = null;
let mapSeq = 0;

/* ---------- location ---------- */
function getLoc(){
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(
    p => { userLoc = {lat:p.coords.latitude, lng:p.coords.longitude};
           $('locBadge').classList.add('on'); $('locText').textContent = 'near you'; },
    () => { $('locText').textContent = 'location off'; },
    { enableHighAccuracy:true, timeout:10000, maximumAge:300000 }
  );
}

/* ---------- rendering ---------- */
function addMsg(role, html){
  const m = document.createElement('div');
  m.className = 'msg ' + (role==='user'?'me':'bot');
  m.innerHTML = `<div class="av">${role==='user'?'you':'🧭'}</div><div class="bubble">${html}</div>`;
  thread.appendChild(m); scrollDown(); return m;
}
function addQuick(replies){
  if (!replies || !replies.length) return;
  const q = document.createElement('div'); q.className = 'quick';
  replies.forEach(r => { const b=document.createElement('button'); b.className='chip'; b.textContent=r;
    b.onclick = () => { q.remove(); send(r); }; q.appendChild(b); });
  thread.appendChild(q); scrollDown();
}
function typing(on){
  let t = $('typing');
  if (on && !t){ const m=document.createElement('div'); m.className='msg bot'; m.id='typing';
    m.innerHTML=`<div class="av">🧭</div><div class="bubble"><div class="typing"><i></i><i></i><i></i></div></div>`;
    thread.appendChild(m); scrollDown(); }
  else if (!on && t) t.remove();
}
function scrollDown(){ requestAnimationFrame(()=> chat.scrollTop = chat.scrollHeight); }

function stopHtml(s,i){
  const rating = s.rating ? `<span class="pill star">★ ${s.rating}</span>` : '';
  const price = s.price ? `<span class="pill">${esc(s.price)}</span>` : '';
  const cats = (s.categories&&s.categories[0]) ? `<span>${esc(String(s.categories[0]).replace(/_/g,' '))}</span>` : '';
  const addr = s.address ? `<span>${esc(s.address)}</span>` : '';
  const gmaps = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(s.name+' '+(s.address||''))}`;
  const review = s.url ? `<a href="${esc(s.url)}" target="_blank" rel="noopener">${s.source==='yelp'?'Yelp':'Website'}</a>` : '';
  const time = s.time ? `<span class="time">${esc(s.time)}</span>` : '';
  return `<div class="stop">
    <div class="num">${s.icon||i+1}</div>
    <div class="body">
      <div class="top">${time}<span class="lbl">${esc(s.label)}</span><span class="cost">~$${s.est_cost}</span></div>
      <h4>${esc(s.name)}</h4>
      <div class="meta">${rating}${price}${cats}${addr}</div>
      ${s.why?`<div class="why">${esc(s.why)}</div>`:''}
      <div class="acts"><a href="${gmaps}" target="_blank" rel="noopener">📍 Directions</a>${review}</div>
    </div></div>`;
}

function evWhen(ev){
  const parts = [];
  if (ev.date){ const d=new Date(ev.date+'T00:00'); parts.push(d.toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'})); }
  if (ev.time) parts.push(ev.time.slice(0,5));
  return parts.join(' · ');
}
function eventsHtml(events){
  if (!events || !events.length) return '';
  const rows = events.map(ev => {
    const meta = [ev.category, ev.venue, evWhen(ev)].filter(Boolean).map(esc).join(' · ');
    const price = ev.price_min ? `<span class="ev-price">$${Math.round(ev.price_min)}+</span>` : '';
    return `<a class="ev" href="${esc(ev.url||'#')}" target="_blank" rel="noopener">
      <div class="ev-body"><b>${esc(ev.name)}</b><span class="ev-meta">${meta}</span></div>
      ${price}<span class="ev-go">Tickets ›</span></a>`;
  }).join('');
  return `<div class="events"><div class="ev-h">🎟️ Happening nearby</div>${rows}</div>`;
}

function appendPlanCard(plan, dayLabel){
  const id = 'map'+(++mapSeq);
  const head = dayLabel ? `<div class="day-head">${esc(dayLabel)}</div>` : '';
  const html = `${head}<div class="itin">
      <div class="map" id="${id}"></div>
      <div class="sum"><span>💸 <b>~$${plan.estimated_cost}</b> / ${plan.party_size}</span>
        <span>✨ <b>${esc(plan.vibe.replace('_',' '))}</b></span>
        <span>📍 <b>${plan.stops.length}</b> stops</span>
        ${plan.weather?`<span>🌤️ <b>${esc(plan.weather)}</b></span>`:''}</div>
      <div class="stops">${plan.stops.map(stopHtml).join('')}</div>
      ${plan.tip?`<div class="tip">💡 ${esc(plan.tip)}</div>`:''}
      ${eventsHtml(plan.events)}</div>`;
  const wrap = document.createElement('div'); wrap.innerHTML = html;
  while (wrap.firstElementChild) thread.appendChild(wrap.firstElementChild);
  scrollDown(); setTimeout(()=>drawMap(id, plan), 60);
}

function appendFoot(buttons){
  const q = document.createElement('div'); q.className = 'quick';
  buttons.forEach(b => { const el=document.createElement('button'); el.className=b.cls||'chip';
    el.textContent=b.label; el.onclick=b.onclick; q.appendChild(el); });
  thread.appendChild(q); scrollDown();
}

function renderPlan(plan){
  appendPlanCard(plan);
  lastItin = { title: plan.intro || 'Your plan', plan };
  appendFoot([
    { label:'💾 Save', cls:'save-chip', onclick:e=>saveCurrent(e.target) },
    { label:'🔄 Try another', onclick:()=>send('plan something different') },
    { label:'💵 Cheaper', onclick:()=>send('make it cheaper') },
    { label:'🥂 Fancier', onclick:()=>send('make it fancier') },
  ]);
}

function renderTrip(days, title){
  days.forEach(d => appendPlanCard(d, `Day ${d.day} — ~$${d.estimated_cost}`));
  lastItin = { title: title || 'Your trip', days };
  appendFoot([
    { label:'💾 Save trip', cls:'save-chip', onclick:e=>saveCurrent(e.target) },
    { label:'🔄 Try another', onclick:()=>send('plan a different trip') },
  ]);
}

/* ---------- saving (localStorage, no account needed) ---------- */
const SAVED_KEY = 'wander_saved';
let lastItin = null;
function getSaved(){ try{ return JSON.parse(localStorage.getItem(SAVED_KEY)) || []; }catch(e){ return []; } }
function setSaved(a){ localStorage.setItem(SAVED_KEY, JSON.stringify(a)); $('savedCount').textContent = a.length; }
function saveCurrent(btn){
  if (!lastItin) return;
  const a = getSaved();
  a.unshift({ id:Date.now(), title:lastItin.title, ts:new Date().toISOString(),
              plan:lastItin.plan||null, days:lastItin.days||null });
  setSaved(a);
  if (btn){ btn.classList.add('done'); btn.textContent='✓ Saved'; }
}
function openSaved(){ renderSavedList(); $('savedBg').classList.remove('hidden'); $('savedDrawer').classList.remove('hidden'); }
function closeSaved(){ $('savedBg').classList.add('hidden'); $('savedDrawer').classList.add('hidden'); }
function renderSavedList(){
  const a = getSaved(), el = $('savedList');
  if (!a.length){ el.innerHTML = `<div class="saved-empty">No saved plans yet.<br>Make one, then tap 💾 Save.</div>`; return; }
  el.innerHTML = a.map(it => {
    const when = new Date(it.ts).toLocaleDateString(undefined,{month:'short',day:'numeric'});
    const n = it.days ? it.days.reduce((s,d)=>s+d.stops.length,0) : (it.plan?it.plan.stops.length:0);
    const sub = it.days ? `${it.days.length}-day trip · ${n} stops · ${when}` : `${n} stops · ${when}`;
    return `<div class="saved-item" data-id="${it.id}"><span class="del" data-del="${it.id}">🗑</span><b>${esc(it.title)}</b><div class="sub">${sub}</div></div>`;
  }).join('');
  el.querySelectorAll('.saved-item').forEach(it => it.onclick = e => { if(e.target.dataset.del) return; loadSaved(+it.dataset.id); });
  el.querySelectorAll('.del').forEach(d => d.onclick = e => { e.stopPropagation(); setSaved(getSaved().filter(x=>x.id!==+d.dataset.del)); renderSavedList(); });
}
function loadSaved(id){
  const it = getSaved().find(x=>x.id===id); if (!it) return;
  closeSaved();
  addMsg('assistant', `📌 <b>${esc(it.title)}</b>`);
  if (it.days) renderTrip(it.days, it.title); else if (it.plan) renderPlan(it.plan);
}
$('savedBtn').onclick = openSaved;
$('savedClose').onclick = closeSaved;
$('savedBg').onclick = closeSaved;

function drawMap(id, plan){
  const map = L.map(id, { zoomControl:false, attributionControl:false, scrollWheelZoom:false });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {maxZoom:19}).addTo(map);
  const pts = plan.stops.map(s=>[s.lat,s.lng]);
  plan.stops.forEach((s,i)=> L.marker([s.lat,s.lng], {icon:L.divIcon({className:'',html:`<div class="num-marker">${i+1}</div>`,iconSize:[26,26],iconAnchor:[13,13]})}).addTo(map));
  if (pts.length>1) L.polyline(pts,{color:'#5eebd4',weight:2,opacity:.5,dashArray:'4 6'}).addTo(map);
  map.fitBounds(L.latLngBounds(pts).pad(0.35));
}

/* ---------- send ---------- */
async function send(text){
  text = (text||'').trim(); if (!text) return;
  $('input').value=''; addMsg('user', esc(text));
  messages.push({role:'user', content:text});
  typing(true); $('send').disabled=true;
  try{
    const res = await fetch(`${API}/plan/chat`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ messages, lat:userLoc&&userLoc.lat, lng:userLoc&&userLoc.lng })
    }).then(r=>r.json());
    typing(false);
    const botText = res.message || '…';
    addMsg('assistant', esc(botText));
    messages.push({role:'assistant', content:botText});
    if (res.type==='itinerary' && res.days && res.days.length) renderTrip(res.days, res.title);
    else if (res.type==='itinerary' && res.plan) renderPlan(res.plan);
    else addQuick(res.quick_replies);
  }catch(e){ typing(false); addMsg('assistant','Hmm, I hit a snag reaching the planner. Try again?'); }
  finally{ $('send').disabled=false; $('input').focus(); }
}

$('send').onclick = ()=>send($('input').value);
$('input').addEventListener('keydown', e=>{ if(e.key==='Enter') send($('input').value); });
window.send = send;

/* ---------- boot ---------- */
getLoc();
$('savedCount').textContent = getSaved().length;
addMsg('assistant', "Hey — I'm <b>Wander</b>. Tell me your <b>budget</b> and the <b>vibe</b>, and I'll plan your night (or whole weekend) near you. 🌆");
addQuick(['🎲 Surprise me','$100 chill date night','$300 adventurous weekend','Fancy night out']);
</script>
</body>
