<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Roamly — your night, planned</title>
<meta name="description" content="Tell me your budget and your vibe — I'll plan a real itinerary of places near you, from dinner to drinks to the dessert you didn't know you needed." />
<meta name="theme-color" content="#ffffff" />
<link rel="preconnect" href="https://unpkg.com" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/config.js"></script>
<style>
  :root{
    /* Roamly — shared Apple-style system: white base, ink text, coral→violet brand */
    --accent:#ff5a5f; --accent2:#7c5cff; --lime:#b8f34a; --hot:#ff3d9a;
    --bg0:#ffffff; --bg1:#ffffff; --bg2:#f5f4f7;
    --card:#ffffff; --card-2:#ffffff; --brd:rgba(0,0,0,.08); --hair:rgba(0,0,0,.06);
    --text:#1d1d1f; --muted:#515154; --muted2:#86868b;
    --shadow:0 20px 45px -16px rgba(60,40,120,.18);
    --ease:cubic-bezier(.22,1,.36,1);
    --pop:cubic-bezier(.34,1.56,.64,1);   /* springy overshoot for that bouncy feel */
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{background:
      radial-gradient(720px 480px at 88% -6%, rgba(124,92,255,.08), transparent 62%),
      radial-gradient(680px 520px at 6% 8%, rgba(255,90,95,.07), transparent 58%),
      radial-gradient(700px 600px at 50% 116%, rgba(255,61,154,.06), transparent 60%),
      var(--bg0);
    color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Segoe UI",Inter,sans-serif;
    -webkit-font-smoothing:antialiased; line-height:1.5; display:flex; flex-direction:column; height:100vh;}
  a{color:inherit; text-decoration:none;}
  .grad{background:linear-gradient(110deg,var(--accent),var(--accent2)); -webkit-background-clip:text; background-clip:text; color:transparent;}

  header{display:flex; align-items:center; gap:10px; padding:16px 20px; border-bottom:1px solid var(--hair);
    position:sticky; top:0; backdrop-filter:blur(14px); z-index:10;}
  .logo{font-weight:850; letter-spacing:-.02em; font-size:20px;}
  .logo .m{display:inline-block; margin-right:6px;}
  header .tag{font-size:12.5px; color:var(--muted2); margin-left:2px;}
  .loc{margin-left:auto; font-size:12px; color:var(--muted); display:flex; align-items:center; gap:7px;
    background:var(--card); border:1px solid var(--brd); padding:7px 12px; border-radius:999px;
    cursor:pointer; transition:.15s;}
  .loc:hover{border-color:var(--accent2); color:var(--text);}
  .loc .dot{width:8px; height:8px; border-radius:50%; background:var(--muted2); transition:.2s;}
  .loc.on .dot{background:var(--accent); box-shadow:0 0 8px var(--accent);}
  .loc.busy .dot{animation:locPulse 1s infinite;}
  @keyframes locPulse{0%,100%{opacity:.35;} 50%{opacity:1;}}

  .chat{flex:1; overflow-y:auto; padding:24px 16px 8px;}
  .thread{max-width:720px; margin:0 auto; display:flex; flex-direction:column; gap:16px;}

  .msg{display:flex; gap:10px; max-width:88%;}
  .msg .av{width:30px; height:30px; border-radius:50%; flex:0 0 auto; display:grid; place-items:center; font-size:15px;
    background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#ffffff; font-weight:800;}
  .bubble{padding:12px 15px; border-radius:16px; font-size:15px;}
  .msg.bot .bubble{background:var(--card-2); border:1px solid var(--brd); border-top-left-radius:5px;}
  .msg.me{align-self:flex-end; flex-direction:row-reverse;}
  .msg.me .av{background:linear-gradient(135deg,var(--accent2),var(--hot)); color:#fff;}
  .msg.me .bubble{background:linear-gradient(180deg,var(--accent),#7c5cff); color:#ffffff; font-weight:600; border-top-right-radius:5px;}

  .quick{display:flex; flex-wrap:wrap; gap:8px; margin:2px 0 4px 40px;}
  .chip{border:1px solid var(--brd); background:var(--card); color:var(--text); font-size:13.5px; font-weight:650;
    padding:9px 15px; border-radius:999px; cursor:pointer; transition:.18s var(--ease);}
  .chip:hover{border-color:var(--accent); color:var(--accent); transform:translateY(-1px);}

  /* itinerary card */
  .itin{margin-left:40px; background:var(--card-2); border:1px solid var(--brd); border-radius:20px; overflow:hidden;
    box-shadow:var(--shadow); animation:rise .5s var(--ease) both;}
  @keyframes rise{from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:none;}}
  .itin .map{height:200px; background:var(--bg2); position:relative; cursor:pointer;}
  .map-open{position:absolute; right:10px; bottom:10px; z-index:1000; border:0; cursor:pointer;
    font-size:12.5px; font-weight:750; padding:8px 14px; border-radius:999px; color:#fff;
    background:rgba(20,18,28,.78); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,.16);
    box-shadow:0 8px 22px -8px rgba(0,0,0,.5); transition:.18s var(--pop);}
  .map-open:hover{background:linear-gradient(135deg,var(--accent),var(--accent2)); border-color:transparent; transform:translateY(-2px);}
  .itin .sum{display:flex; gap:14px; padding:14px 18px; border-bottom:1px solid var(--hair); font-size:13px; color:var(--muted); flex-wrap:wrap;}
  .itin .sum b{color:var(--text);}
  .stops{padding:6px 10px 12px;}
  .stop{display:flex; gap:13px; padding:13px 12px; border-radius:14px; position:relative;}
  .stop:not(:last-child)::after{content:""; position:absolute; left:29px; top:44px; bottom:-2px; width:2px;
    background:linear-gradient(var(--brd),transparent);}
  .stop .num{width:34px; height:34px; flex:0 0 auto; border-radius:50%; display:grid; place-items:center; font-size:16px;
    background:rgba(124,92,255,.14); border:1px solid var(--brd); z-index:1;}
  .stop .body{flex:1; min-width:0;}
  .stop .top{display:flex; align-items:baseline; gap:8px; flex-wrap:wrap;}
  .stop .time{font-size:11px; font-weight:800; color:#ffffff; background:var(--accent); padding:2px 8px; border-radius:999px;}
  .stop .lbl{font-size:11px; font-weight:800; letter-spacing:.05em; text-transform:uppercase; color:var(--accent);}
  .itin .tip{margin:2px 12px 14px; padding:12px 14px; border-radius:14px; font-size:13.5px; color:var(--text);
    background:linear-gradient(180deg,rgba(138,123,255,.14),rgba(124,92,255,.08)); border:1px solid var(--brd);}
  .events{margin:0 12px 14px;}
  .ev-h{font-size:11px; font-weight:800; letter-spacing:.06em; text-transform:uppercase; color:var(--hot); margin:4px 0 8px;}
  .ev{display:flex; align-items:center; gap:10px; padding:11px 13px; border-radius:12px; margin-bottom:8px;
    background:rgba(255,122,156,.08); border:1px solid rgba(255,122,156,.22); transition:.15s;}
  .ev:hover{background:rgba(255,122,156,.14);}
  .ev-body{flex:1; min-width:0;} .ev-body b{font-size:14px; display:block;}
  .ev-meta{font-size:12px; color:var(--muted2);}
  .ev-price{font-size:12px; font-weight:700; color:var(--text);}
  .ev-go{font-size:12px; font-weight:800; color:var(--hot); white-space:nowrap;}

  /* ---------- picker (build your own) ---------- */
  .picker{margin-left:40px;}
  .psec{margin-bottom:16px;}
  .psec-h{display:flex; align-items:baseline; gap:8px; margin-bottom:9px;}
  .psec-h b{font-size:15px; font-weight:800;}
  .psec-h span{font-size:11px; color:var(--muted2); font-weight:600; text-transform:uppercase; letter-spacing:.05em;}
  .cards{display:flex; gap:10px; overflow-x:auto; padding-bottom:6px; scroll-snap-type:x proximity;}
  .cards::-webkit-scrollbar{height:6px;} .cards::-webkit-scrollbar-thumb{background:var(--brd); border-radius:6px;}
  .ocard{flex:0 0 186px; scroll-snap-align:start; background:var(--card-2); border:1px solid var(--brd);
    border-radius:14px; overflow:hidden; cursor:pointer; transition:.15s var(--ease); position:relative;}
  .ocard:hover{border-color:var(--accent); transform:translateY(-2px);}
  .ocard.sel{border-color:var(--accent); box-shadow:inset 0 0 0 2px var(--accent); background:rgba(124,92,255,.08);}
  .ocard .ph{width:100%; height:92px; object-fit:cover; background:linear-gradient(135deg,#efe7ff,#ffe6dc); display:block;}
  .ocard .noph{width:100%; height:92px; display:grid; place-items:center; font-size:26px; background:linear-gradient(135deg,#efe7ff,#ffe6dc);}
  .ocard .bd{padding:9px 11px 11px;}
  .ocard .nm{font-weight:750; font-size:13px; line-height:1.25; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;}
  .ocard .mt{font-size:11.5px; color:var(--muted2); margin-top:4px; display:flex; gap:6px; flex-wrap:wrap; align-items:center;}
  .ocard .tg{position:absolute; top:8px; left:8px; font-size:11px; font-weight:800; padding:3px 7px; border-radius:999px;
    background:rgba(255,255,255,.92); backdrop-filter:blur(6px);}
  .ocard .chk{position:absolute; top:8px; right:8px; width:22px; height:22px; border-radius:50%; display:grid; place-items:center;
    background:rgba(255,255,255,.82); color:transparent; font-size:13px; font-weight:900; transition:.15s;}
  .ocard.sel .chk{background:var(--accent); color:#ffffff;}
  .buildbar{display:flex; gap:12px; align-items:center; margin:6px 0 4px; position:sticky; bottom:0;}
  .buildbtn{flex:1; border:0; border-radius:999px; padding:14px; font-size:15px; font-weight:800; cursor:pointer;
    background:linear-gradient(180deg,var(--accent),#7c5cff); color:#ffffff; box-shadow:0 10px 28px -6px rgba(124,92,255,.5);
    transition:transform .15s var(--ease);}
  .buildbtn:hover{transform:translateY(-2px);} .buildbtn:disabled{opacity:.5; cursor:default; transform:none;}
  .stop h4{margin:2px 0; font-size:16px; font-weight:750; letter-spacing:-.01em;}
  .stop .meta{font-size:12.5px; color:var(--muted2); display:flex; gap:8px; flex-wrap:wrap; align-items:center;}
  .stop .why{font-size:13.5px; color:var(--muted); margin-top:5px;}
  .stop-img{width:100%; height:140px; object-fit:cover; border-radius:16px; margin:9px 0 2px;
    background:var(--bg2); box-shadow:0 8px 20px -12px rgba(124,92,255,.45); display:block;}
  .stop .cost{margin-left:auto; font-weight:800; color:var(--text); font-size:14px; white-space:nowrap;}
  .pill{font-size:11px; font-weight:700; padding:2px 8px; border-radius:999px; background:rgba(0,0,0,.05);}
  .pill.star{color:#c98a00; background:rgba(255,209,102,.12);}
  .stop .acts{display:flex; gap:8px; margin-top:9px;}
  .stop .acts a{font-size:12px; font-weight:700; padding:6px 11px; border-radius:999px; border:1px solid var(--brd);
    background:var(--card); color:var(--text);}
  .stop .acts a:hover{border-color:var(--accent); color:var(--accent);}
  .itin .foot{padding:12px 18px 16px; display:flex; gap:10px; flex-wrap:wrap;}

  .typing{display:flex; gap:5px; padding:14px 16px;}
  .typing i{width:7px; height:7px; border-radius:50%; background:var(--muted2); animation:bl 1.2s infinite;}
  .typing i:nth-child(2){animation-delay:.2s;} .typing i:nth-child(3){animation-delay:.4s;}
  @keyframes bl{0%,60%,100%{opacity:.3; transform:translateY(0);} 30%{opacity:1; transform:translateY(-3px);}}

  .composer{border-top:1px solid var(--hair); padding:14px 16px calc(14px + env(safe-area-inset-bottom));
    background:rgba(255,255,255,.82); backdrop-filter:saturate(1.8) blur(20px);}
  .composer .row{max-width:720px; margin:0 auto; display:flex; gap:10px;}
  .composer input{flex:1; padding:14px 18px; border-radius:999px; border:1px solid var(--brd); background:var(--card);
    color:var(--text); font-size:15px; outline:none;}
  .composer input:focus{border-color:var(--accent);}
  .send{width:50px; flex:0 0 auto; border:0; border-radius:50%; cursor:pointer; font-size:18px;
    background:linear-gradient(180deg,var(--accent),#7c5cff); color:#ffffff; transition:transform .15s var(--ease);}
  .send:hover{transform:scale(1.06);} .send:disabled{opacity:.5;}
  .num-marker{background:var(--accent); color:#ffffff; width:26px; height:26px; border-radius:50%; border:2px solid #fff;
    display:grid; place-items:center; font-weight:800; font-size:13px; box-shadow:0 2px 8px rgba(0,0,0,.5);}
  .leaflet-container{background:var(--bg2);}

  .saved-btn{margin-left:auto; margin-right:10px; border:1px solid var(--brd); background:var(--card); color:var(--text);
    font-size:13px; font-weight:700; padding:7px 13px; border-radius:999px; cursor:pointer;}
  .saved-btn:hover{border-color:var(--accent); color:var(--accent);}
  header .loc{margin-left:0;}

  .day-head{margin:6px 0 -6px 40px; font-size:12px; font-weight:800; letter-spacing:.06em; text-transform:uppercase;
    color:var(--accent2);}
  .save-chip{border:1px solid var(--brd); background:var(--card); color:var(--text); font-size:13px; font-weight:700;
    padding:9px 15px; border-radius:999px; cursor:pointer;}
  .save-chip:hover{border-color:var(--accent); color:var(--accent);}
  .save-chip.done{color:var(--accent); border-color:var(--accent); background:rgba(124,92,255,.1);}

  .drawer-bg{position:fixed; inset:0; background:rgba(0,0,0,.4); backdrop-filter:blur(4px); z-index:40;}
  .drawer{position:fixed; top:0; right:0; bottom:0; width:min(380px,90vw); z-index:41; background:var(--bg1);
    border-left:1px solid var(--brd); box-shadow:var(--shadow); display:flex; flex-direction:column;
    transform:translateX(100%); transition:transform .35s var(--ease);}
  .drawer:not(.hidden){transform:translateX(0);}
  .drawer-head{display:flex; align-items:center; padding:18px 20px; border-bottom:1px solid var(--hair); font-size:16px;}
  .drawer-head .x{margin-left:auto; cursor:pointer; font-size:22px; color:var(--muted2);}
  .drawer-body{flex:1; overflow-y:auto; padding:14px;}
  .saved-item{background:var(--card); border:1px solid var(--brd); border-radius:14px; padding:14px; margin-bottom:10px; cursor:pointer;}
  .saved-item:hover{border-color:var(--accent);}
  .saved-item b{font-size:14.5px;} .saved-item .sub{font-size:12px; color:var(--muted2); margin-top:3px;}
  .saved-item .del{float:right; color:var(--muted2); font-size:15px;}
  .saved-item .del:hover{color:var(--hot);}
  .saved-empty{text-align:center; color:var(--muted2); padding:40px 10px; font-size:14px;}
  .hidden{display:none !important;}
  @media(max-width:560px){ .msg{max-width:96%;} .itin,.quick,.day-head{margin-left:0;} }

  /* ---------- Gen-Z polish: chunky · rounded · bouncy ---------- */
  .logo{font-size:20px; font-weight:750; letter-spacing:-.02em;}
  .logo .m{filter:drop-shadow(0 2px 6px rgba(124,92,255,.4));}
  header{background:rgba(255,255,255,.72); backdrop-filter:saturate(1.8) blur(20px);}
  header .tag{font-weight:600;}
  .bubble{border-radius:22px; font-size:15.5px;}
  .msg.bot .bubble{border-top-left-radius:7px; box-shadow:0 8px 20px -12px rgba(124,92,255,.45);}
  .msg.me .bubble{border-top-right-radius:7px; box-shadow:0 10px 22px -10px rgba(255,90,95,.5);}
  .chip{font-weight:750; box-shadow:0 5px 13px -7px rgba(124,92,255,.4);}
  .chip:hover{transform:translateY(-2px) scale(1.03); border-color:var(--accent2); color:var(--accent2);}
  .chip:active{transform:scale(.95);}
  .itin{border-radius:26px; box-shadow:0 24px 52px -18px rgba(124,92,255,.4);}
  .stop .num{background:linear-gradient(135deg,rgba(255,90,95,.18),rgba(124,92,255,.18)); border-color:transparent;}
  .ocard{border-radius:20px; box-shadow:0 10px 26px -14px rgba(124,92,255,.38); transition:.18s var(--pop);}
  .ocard:hover{transform:translateY(-4px) scale(1.02); border-color:var(--accent2);}
  .ocard:active{transform:scale(.98);}
  .ocard.sel{border-color:var(--accent); box-shadow:inset 0 0 0 3px var(--accent), 0 14px 30px -12px rgba(255,90,95,.5);}
  .ocard .chk{border:2px solid rgba(0,0,0,.12);}
  .ocard.sel .chk{border-color:transparent; background:var(--accent);}
  .ocard .tg{color:var(--text); box-shadow:0 4px 10px -4px rgba(0,0,0,.18);}
  .buildbtn{background:linear-gradient(120deg,var(--accent),var(--accent2)); box-shadow:0 14px 32px -8px rgba(255,90,95,.55);}
  .buildbtn:hover{transform:translateY(-3px) scale(1.01);}
  .send{background:linear-gradient(135deg,var(--accent),var(--accent2)); box-shadow:0 8px 20px -6px rgba(255,90,95,.5);}
  .send:hover{transform:scale(1.1) rotate(6deg);}
  .composer input{font-size:15.5px; box-shadow:0 6px 16px -10px rgba(124,92,255,.4);}
  .composer input:focus{border-color:var(--accent2); box-shadow:0 0 0 4px rgba(124,92,255,.14);}
  .psec-h b{font-size:16px; font-weight:900; letter-spacing:-.01em;}

  /* ---------- questionnaire ---------- */
  .quiz{position:fixed; inset:0; z-index:60; overflow-y:auto; display:flex; align-items:center; justify-content:center;
    padding:30px 18px; background:
      radial-gradient(700px 460px at 85% -6%, rgba(124,92,255,.12), transparent 60%),
      radial-gradient(640px 520px at 8% 6%, rgba(255,90,95,.1), transparent 58%),
      radial-gradient(760px 620px at 50% 118%, rgba(255,61,154,.08), transparent 60%),
      var(--bg0);}
  .quiz-card{width:100%; max-width:560px;}
  .quiz .hi{font-size:13px; font-weight:800; letter-spacing:.16em; text-transform:uppercase; color:var(--accent); margin-bottom:8px;}
  .quiz h1{font-size:clamp(30px,7.5vw,48px); font-weight:900; letter-spacing:-.035em; line-height:1.0; margin:0 0 8px;}
  .quiz h1 .g{background:linear-gradient(110deg,var(--accent),var(--accent2)); -webkit-background-clip:text; background-clip:text; color:transparent;}
  .quiz .sub{color:var(--muted); font-size:15.5px; margin-bottom:24px;}
  .q{margin-bottom:20px; animation:qin .55s var(--pop) both;}
  .q:nth-child(1){animation-delay:.04s;} .q:nth-child(2){animation-delay:.10s;}
  .q:nth-child(3){animation-delay:.16s;} .q:nth-child(4){animation-delay:.22s;} .q:nth-child(5){animation-delay:.28s;}
  .q .ql{font-size:14.5px; font-weight:800; margin-bottom:10px;}
  .opts{display:flex; flex-wrap:wrap; gap:9px;}
  .opt{border:1.5px solid var(--brd); background:var(--card); color:var(--text); font-size:14.5px; font-weight:750;
    padding:11px 16px; border-radius:15px; cursor:pointer; transition:.16s var(--pop); display:inline-flex; gap:7px; align-items:center;
    box-shadow:0 6px 14px -9px rgba(124,92,255,.35);}
  .opt:hover{transform:translateY(-2px) scale(1.03);}
  .opt:active{transform:scale(.95);}
  .opt.on{background:linear-gradient(120deg,var(--accent),var(--accent2)); color:#fff; border-color:transparent;
    box-shadow:0 10px 22px -8px rgba(255,90,95,.5);}
  .quiz .go{width:100%; margin-top:10px; border:0; border-radius:999px; padding:16px; font-size:16px; font-weight:900; cursor:pointer;
    color:#fff; background:linear-gradient(120deg,var(--accent),var(--accent2)); box-shadow:0 16px 34px -10px rgba(255,90,95,.55);
    transition:transform .15s var(--pop);}
  .quiz .go:hover{transform:translateY(-3px) scale(1.01);} .quiz .go:disabled{opacity:.45; transform:none; cursor:default;}
  .quiz .skip{display:block; text-align:center; margin-top:14px; color:var(--muted2); font-size:13px; cursor:pointer;}
  .quiz .skip:hover{color:var(--accent);}
  @keyframes qin{from{opacity:0; transform:translateY(16px);} to{opacity:1; transform:none;}}
</style>
</head>
<body>
  <header>
    <a class="logo" href="/"><span class="m">🧭</span><span class="grad">Roamly</span></a>
    <span class="tag">your day, your call ✨</span>
    <a class="saved-btn" href="app.html" style="margin-left:auto; text-decoration:none; display:inline-flex; align-items:center;">🗺️ Map</a>
    <button class="saved-btn" id="savedBtn" title="Saved plans" style="margin-left:0;">💾 <span id="savedCount">0</span></button>
    <div class="loc" id="locBadge" title="Click to turn your location on or off"><span class="dot"></span><span id="locText">location off</span></div>
  </header>

  <!-- saved plans drawer -->
  <div class="drawer-bg hidden" id="savedBg"></div>
  <aside class="drawer hidden" id="savedDrawer">
    <div class="drawer-head"><b>Saved plans</b><span class="x" id="savedClose">×</span></div>
    <div class="drawer-body" id="savedList"></div>
  </aside>

  <div class="chat" id="chat"><div class="thread" id="thread"></div></div>

  <div class="composer">
    <div class="row">
      <input id="input" placeholder="e.g. I've got $100 for a chill date night" autocomplete="off" />
      <button class="send" id="send" title="Send">➤</button>
    </div>
  </div>

<script>
const API = window.API_BASE;
const $ = id => document.getElementById(id);
// The planner is members-only: same account/token as the map app (app.html).
const token = () => localStorage.getItem('trek_token');
const authHeaders = () => token() ? { 'Authorization': 'Bearer ' + token() } : {};
const esc = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const thread = $('thread'), chat = $('chat');
let messages = [];           // {role, content}
let userLoc = null;
let mapSeq = 0;
const seenVenues = new Set();   // venues already suggested — sent as `exclude` so re-rolls never repeat

/* ---------- location (user can flip this on/off any time) ---------- */
function getLoc(){
  if (!navigator.geolocation){ $('locText').textContent = 'not supported'; return; }
  $('locBadge').classList.add('busy');
  navigator.geolocation.getCurrentPosition(
    p => { userLoc = {lat:p.coords.latitude, lng:p.coords.longitude};
           $('locBadge').classList.remove('busy'); $('locBadge').classList.add('on');
           $('locText').textContent = 'near you'; },
    () => { $('locBadge').classList.remove('busy','on'); $('locText').textContent = 'location off'; userLoc = null; },
    { enableHighAccuracy:true, timeout:10000, maximumAge:300000 }
  );
}
function toggleLoc(){
  if (userLoc){
    // Off — stop sending it with planning requests until turned back on.
    userLoc = null;
    $('locBadge').classList.remove('on','busy');
    $('locText').textContent = 'location off';
  } else {
    getLoc();
  }
}
$('locBadge').onclick = toggleLoc;

/* ---------- rendering ---------- */
function addMsg(role, html){
  const m = document.createElement('div');
  m.className = 'msg ' + (role==='user'?'me':'bot');
  m.innerHTML = `<div class="av">${role==='user'?'you':'🧭'}</div><div class="bubble">${html}</div>`;
  thread.appendChild(m); scrollDown(role==='user'); return m;
}
function addQuick(replies){
  if (!replies || !replies.length) return;
  const q = document.createElement('div'); q.className = 'quick';
  replies.forEach(r => { const b=document.createElement('button'); b.className='chip'; b.textContent=r;
    b.onclick = () => { q.remove(); send(r); }; q.appendChild(b); });
  thread.appendChild(q); scrollDown();
}
function typing(on){
  let t = $('typing');
  if (on && !t){ const m=document.createElement('div'); m.className='msg bot'; m.id='typing';
    m.innerHTML=`<div class="av">🧭</div><div class="bubble"><div class="typing"><i></i><i></i><i></i></div></div>`;
    thread.appendChild(m); scrollDown(); }
  else if (!on && t) t.remove();
}
/* Sticky autoscroll: follow new messages only while the user is at the bottom,
   so scrolling up to reread never gets yanked back down. */
let stickBottom = true;
chat.addEventListener('scroll', () => {
  stickBottom = chat.scrollHeight - chat.scrollTop - chat.clientHeight < 140;
});
function scrollDown(force){
  if (force) stickBottom = true;
  if (stickBottom) requestAnimationFrame(()=> chat.scrollTop = chat.scrollHeight);
}

/* Streaming feel: type the assistant's reply in instead of dumping it at once. */
function addMsgTyped(text){
  const m = addMsg('assistant', '');
  const b = m.querySelector('.bubble');
  const chars = [...String(text)];
  const step = Math.max(1, Math.round(chars.length / 70));   // ~1.1s regardless of length
  let i = 0;
  (function tick(){
    i = Math.min(chars.length, i + step);
    b.textContent = chars.slice(0, i).join('');
    scrollDown();
    if (i < chars.length) setTimeout(tick, 16);
  })();
  return m;
}

function stopHtml(s,i){
  const rating = s.rating ? `<span class="pill star">★ ${s.rating}</span>` : '';
  const price = s.price ? `<span class="pill">${esc(s.price)}</span>` : '';
  const cats = (s.categories&&s.categories[0]) ? `<span>${esc(String(s.categories[0]).replace(/_/g,' '))}</span>` : '';
  const addr = s.address ? `<span>${esc(s.address)}</span>` : '';
  const gmaps = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(s.name+' '+(s.address||''))}`;
  const review = s.url ? `<a href="${esc(s.url)}" target="_blank" rel="noopener">${s.source==='yelp'?'Yelp':'Website'}</a>` : '';
  const time = s.time ? `<span class="time">${esc(s.time)}</span>` : '';
  const img = s.image ? `<img class="stop-img" src="${esc(s.image)}" alt="" loading="lazy" onerror="this.remove()">` : '';
  return `<div class="stop">
    <div class="num">${s.icon||i+1}</div>
    <div class="body">
      <div class="top">${time}<span class="lbl">${esc(s.label)}</span><span class="cost">~$${s.est_cost}</span></div>
      <h4>${esc(s.name)}</h4>
      <div class="meta">${rating}${price}${cats}${addr}</div>
      ${img}
      ${s.why?`<div class="why">${esc(s.why)}</div>`:''}
      <div class="acts"><a href="${gmaps}" target="_blank" rel="noopener">📍 Directions</a>${review}</div>
    </div></div>`;
}

function evWhen(ev){
  const parts = [];
  if (ev.date){ const d=new Date(ev.date+'T00:00'); parts.push(d.toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'})); }
  if (ev.time) parts.push(ev.time.slice(0,5));
  return parts.join(' · ');
}
function eventsHtml(events){
  if (!events || !events.length) return '';
  const rows = events.map(ev => {
    const meta = [ev.category, ev.venue, evWhen(ev)].filter(Boolean).map(esc).join(' · ');
    const price = ev.price_min ? `<span class="ev-price">$${Math.round(ev.price_min)}+</span>` : '';
    return `<a class="ev" href="${esc(ev.url||'#')}" target="_blank" rel="noopener">
      <div class="ev-body"><b>${esc(ev.name)}</b><span class="ev-meta">${meta}</span></div>
      ${price}<span class="ev-go">Tickets ›</span></a>`;
  }).join('');
  return `<div class="events"><div class="ev-h">🎟️ Happening nearby</div>${rows}</div>`;
}

function appendPlanCard(plan, dayLabel){
  plan.stops.forEach(s => seenVenues.add(s.name));   // never suggest these again
  const id = 'map'+(++mapSeq);
  const head = dayLabel ? `<div class="day-head">${esc(dayLabel)}</div>` : '';
  const html = `${head}<div class="itin">
      <div class="map" id="${id}"><button class="map-open" type="button">🗺️ Open on map</button></div>
      <div class="sum"><span>💸 <b>~$${plan.estimated_cost}</b> / ${plan.party_size}</span>
        <span>✨ <b>${esc(plan.vibe.replace('_',' '))}</b></span>
        <span>📍 <b>${plan.stops.length}</b> stops</span>
        ${plan.weather?`<span>🌤️ <b>${esc(plan.weather)}</b></span>`:''}</div>
      <div class="stops">${plan.stops.map(stopHtml).join('')}</div>
      ${plan.tip?`<div class="tip">💡 ${esc(plan.tip)}</div>`:''}
      ${eventsHtml(plan.events)}</div>`;
  const wrap = document.createElement('div'); wrap.innerHTML = html;
  const mapEl = wrap.querySelector(`#${id}`);
  const openBtn = mapEl.querySelector('.map-open');
  mapEl.addEventListener('click', (e) => { e.stopPropagation(); openOnAppMap(plan, dayLabel); });
  openBtn.addEventListener('click', (e) => { e.stopPropagation(); openOnAppMap(plan, dayLabel); });
  while (wrap.firstElementChild) thread.appendChild(wrap.firstElementChild);
  scrollDown(); setTimeout(()=>drawMap(id, plan), 60);
}

// Hands this exact itinerary off to the full map app — same stops, plotted for
// real, plus whatever hidden gems are nearby. Opens in a new tab so the chat stays put.
function openOnAppMap(plan, dayLabel){
  const payload = {
    title: dayLabel || plan.intro || 'Your planned night',
    stops: plan.stops.map(s => ({ name:s.name, lat:s.lat, lng:s.lng, time:s.time||null, label:s.label||null })),
  };
  const url = 'app.html?itin=' + encodeURIComponent(JSON.stringify(payload));
  window.open(url, '_blank', 'noopener');
}

function appendFoot(buttons){
  const q = document.createElement('div'); q.className = 'quick';
  buttons.forEach(b => { const el=document.createElement('button'); el.className=b.cls||'chip';
    el.textContent=b.label; el.onclick=b.onclick; q.appendChild(el); });
  thread.appendChild(q); scrollDown();
}

function renderPlan(plan){
  appendPlanCard({ ...plan, events: [] });   // events come as a question, not a strip
  lastItin = { title: plan.intro || 'Your plan', plan };
  appendFoot([
    { label:'💾 Save', cls:'save-chip', onclick:e=>saveCurrent(e.target) },
    { label:'🔄 Try another', onclick:()=>send('plan something different') },
    { label:'🎲 Surprise me', onclick:()=>send('surprise me with something off the beaten path', null, {surprise:true}) },
    { label:'💵 Cheaper', onclick:()=>send('make it cheaper') },
    { label:'🥂 Fancier', onclick:()=>send('make it fancier') },
  ]);
  suggestEvents(plan);
}

/* ---------- event opt-in: suggest what's on nearby, add only on a "yes" ---------- */
function suggestEvents(plan, idx=0){
  const evs = plan.events || [];
  if (idx >= evs.length || idx >= 2) return;         // suggest at most two
  const ev = evs[idx];
  const when = evWhen(ev);
  const price = ev.price_min
    ? ` Tickets run $${Math.round(ev.price_min)}${ev.price_max && ev.price_max !== ev.price_min ? `–$${Math.round(ev.price_max)}` : '+'}.`
    : ` The organizer hasn't published pricing — the tickets page has current prices.`;
  addMsg('assistant', esc(`One more thing — ${ev.name}${ev.venue?` at ${ev.venue}`:''}${when?`, ${when}`:''} is on nearby.${price} Want me to add it to your plan?`));
  const q = document.createElement('div'); q.className = 'quick';
  const yes = document.createElement('button'); yes.className='chip'; yes.textContent='🎟️ Yes, add it';
  const no  = document.createElement('button'); no.className='chip'; no.textContent='🙅 No thanks';
  if (ev.url){
    const tix = document.createElement('button'); tix.className='chip'; tix.textContent='🎫 Check price & tickets';
    tix.onclick = ()=> window.open(ev.url, '_blank', 'noopener');
    q.appendChild(tix);
  }
  const done = (took) => {
    q.remove();
    if (took){
      addEventToPlan(plan, ev);
      addMsg('assistant', esc(`Done — ${ev.name} is in. Here's the updated plan:`));
      appendPlanCard({ ...plan, events: [] });
      lastItin = { title: plan.intro || 'Your plan', plan };
    } else {
      addMsg('assistant', idx+1 < Math.min(evs.length,2) ? 'No problem.' : "No problem — the plan stays as is.");
      suggestEvents(plan, idx+1);                    // offer the next one
    }
  };
  yes.onclick = ()=>done(true); no.onclick = ()=>done(false);
  q.appendChild(yes); q.appendChild(no); thread.appendChild(q); scrollDown();
}

function addEventToPlan(plan, ev){
  const cost = Math.round(ev.price_min || 40);
  plan.stops.push({
    slot:'event', label:'Live event', icon:'🎟️',
    name: ev.name, lat: ev.lat, lng: ev.lng,
    rating: null, price: null,
    address: ev.venue || null, image: ev.image || null,
    url: ev.url || null, source: 'ticketmaster',
    est_cost: cost, categories: [ev.category].filter(Boolean),
    time: ev.time ? ev.time.slice(0,5) : null,
    why: `Live ${ev.category ? ev.category.toLowerCase() : 'event'}${evWhen(ev) ? ' · ' + evWhen(ev) : ''} — you said yes, so it's locked in.`,
  });
  plan.estimated_cost = (plan.estimated_cost || 0) + cost * Math.max(1, plan.party_size || 1);
  plan.events = plan.events.filter(e => e !== ev);   // no longer just "nearby" — it's in the plan
}

function renderTrip(days, title){
  days.forEach(d => appendPlanCard(d, `Day ${d.day} — ~$${d.estimated_cost}`));
  lastItin = { title: title || 'Your trip', days };
  appendFoot([
    { label:'💾 Save trip', cls:'save-chip', onclick:e=>saveCurrent(e.target) },
    { label:'🔄 Try another', onclick:()=>send('plan a different trip') },
  ]);
}

/* ---------- saving (localStorage, no account needed) ---------- */
const SAVED_KEY = 'wander_saved';
let lastItin = null;
function getSaved(){ try{ return JSON.parse(localStorage.getItem(SAVED_KEY)) || []; }catch(e){ return []; } }
function setSaved(a){ localStorage.setItem(SAVED_KEY, JSON.stringify(a)); $('savedCount').textContent = a.length; }
function saveCurrent(btn){
  if (!lastItin) return;
  const a = getSaved();
  a.unshift({ id:Date.now(), title:lastItin.title, ts:new Date().toISOString(),
              plan:lastItin.plan||null, days:lastItin.days||null });
  setSaved(a);
  if (btn){ btn.classList.add('done'); btn.textContent='✓ Saved'; }
}
function openSaved(){ renderSavedList(); $('savedBg').classList.remove('hidden'); $('savedDrawer').classList.remove('hidden'); }
function closeSaved(){ $('savedBg').classList.add('hidden'); $('savedDrawer').classList.add('hidden'); }
function renderSavedList(){
  const a = getSaved(), el = $('savedList');
  if (!a.length){ el.innerHTML = `<div class="saved-empty">No saved plans yet.<br>Make one, then tap 💾 Save.</div>`; return; }
  el.innerHTML = a.map(it => {
    const when = new Date(it.ts).toLocaleDateString(undefined,{month:'short',day:'numeric'});
    const n = it.days ? it.days.reduce((s,d)=>s+d.stops.length,0) : (it.plan?it.plan.stops.length:0);
    const sub = it.days ? `${it.days.length}-day trip · ${n} stops · ${when}` : `${n} stops · ${when}`;
    return `<div class="saved-item" data-id="${it.id}"><span class="del" data-del="${it.id}">🗑</span><b>${esc(it.title)}</b><div class="sub">${sub}</div></div>`;
  }).join('');
  el.querySelectorAll('.saved-item').forEach(it => it.onclick = e => { if(e.target.dataset.del) return; loadSaved(+it.dataset.id); });
  el.querySelectorAll('.del').forEach(d => d.onclick = e => { e.stopPropagation(); setSaved(getSaved().filter(x=>x.id!==+d.dataset.del)); renderSavedList(); });
}
function loadSaved(id){
  const it = getSaved().find(x=>x.id===id); if (!it) return;
  closeSaved();
  addMsg('assistant', `📌 <b>${esc(it.title)}</b>`);
  if (it.days) renderTrip(it.days, it.title); else if (it.plan) renderPlan(it.plan);
}
$('savedBtn').onclick = openSaved;
$('savedClose').onclick = closeSaved;
$('savedBg').onclick = closeSaved;

function drawMap(id, plan){
  // Static preview thumbnail — dragging/zooming is off so a tap anywhere always
  // opens the real map instead of fighting Leaflet's own gesture handling.
  const map = L.map(id, { zoomControl:false, attributionControl:false, scrollWheelZoom:false,
    dragging:false, touchZoom:false, doubleClickZoom:false, boxZoom:false, keyboard:false, tap:false });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {maxZoom:19}).addTo(map);
  const pts = plan.stops.map(s=>[s.lat,s.lng]);
  plan.stops.forEach((s,i)=> L.marker([s.lat,s.lng], {icon:L.divIcon({className:'',html:`<div class="num-marker">${i+1}</div>`,iconSize:[26,26],iconAnchor:[13,13]})}).addTo(map));
  if (pts.length>1) L.polyline(pts,{color:'#7c5cff',weight:2,opacity:.5,dashArray:'4 6'}).addTo(map);
  map.fitBounds(L.latLngBounds(pts).pad(0.35));
}

/* ---------- send ---------- */
/* ---------- picker (build your own itinerary) ---------- */
let picker = null;
const SECTION_LIMIT = { activity:2, cafe:1, lunch:1, dinner:1, leisure:1, dessert:1, events:1 };
const SEC_EMOJI = { activity:'🎡', cafe:'☕', lunch:'🥗', dinner:'🍽️', leisure:'🎶', dessert:'🍰', events:'🎟️' };
const oid = (sec, name) => sec + '::' + name;

function eventToOption(ev){
  const when = [ev.date, (ev.time||'').slice(0,5)].filter(Boolean).join(' ');
  return { slot:'event', name:ev.name, lat:ev.lat, lng:ev.lng, categories:[ev.category].filter(Boolean),
    address:ev.venue, image:ev.image, url:ev.url, source:'ticketmaster',
    est_cost: ev.price_min ? Math.round(ev.price_min) : 40, arousal:3.5, tag:'🎟️', tag_label:when };
}

function optionCard(secKey, o){
  const id = oid(secKey, o.name), emoji = SEC_EMOJI[secKey] || '📍';
  const el = document.createElement('div'); el.className = 'ocard';
  el.innerHTML = `${o.image?'<img class="ph" alt="">':`<div class="noph">${emoji}</div>`}
    ${o.tag?`<span class="tg">${o.tag} ${esc(o.tag_label||'')}</span>`:''}
    <span class="chk">✓</span>
    <div class="bd"><div class="nm">${esc(o.name)}</div>
      <div class="mt">${o.rating?`<span>★ ${o.rating}</span>`:''}${o.price?`<span>${esc(o.price)}</span>`:''}<span>~$${o.est_cost}</span></div></div>`;
  if (o.image){ const img=el.querySelector('img'); img.src=o.image; img.onerror=()=>{ img.outerHTML=`<div class="noph">${emoji}</div>`; }; }
  picker.els.set(id, el);
  el.onclick = () => toggleSelect(secKey, id, o, el);
  return el;
}

function toggleSelect(secKey, id, o, el){
  if (picker.sel.has(id)){ picker.sel.delete(id); el.classList.remove('sel'); }
  else {
    const inSec = [...picker.sel.keys()].filter(k => k.startsWith(secKey+'::'));
    if (inSec.length >= (SECTION_LIMIT[secKey]||1)){
      const drop = inSec[0]; picker.sel.delete(drop);
      const de = picker.els.get(drop); if (de) de.classList.remove('sel');
    }
    picker.sel.set(id, { ...o, slot: secKey==='events' ? 'event' : (o.slot||secKey) });
    el.classList.add('sel');
  }
  updateBuildBar();
}

function updateBuildBar(){
  const sels = [...picker.sel.values()], ppl = picker.ctx.party_size || 2;
  const total = sels.reduce((s,o)=>s+(o.est_cost||0),0) * ppl;
  picker.bar.disabled = !sels.length;
  picker.bar.textContent = sels.length
    ? `Build my itinerary · ~$${total} · ${sels.length} spot${sels.length>1?'s':''}`
    : 'Pick a few spots to build';
}

function renderPicker(data){
  picker = { ctx:data.context||{}, loc:data.location||{}, sel:new Map(), els:new Map(), bar:null };
  const wrap = document.createElement('div'); wrap.className = 'picker';
  const sections = (data.sections||[]).slice();
  if (data.events && data.events.length)
    sections.push({ key:'events', label:'Live events', icon:'🎟️', hint:'optional',
                    options: data.events.map(eventToOption) });
  sections.forEach(sec => {
    const secEl = document.createElement('div'); secEl.className = 'psec';
    secEl.innerHTML = `<div class="psec-h"><b>${sec.icon} ${esc(sec.label)}</b><span>${esc(sec.hint)}</span></div>`;
    const row = document.createElement('div'); row.className = 'cards';
    sec.options.forEach(o => row.appendChild(optionCard(sec.key, o)));
    secEl.appendChild(row); wrap.appendChild(secEl);
  });
  const barWrap = document.createElement('div'); barWrap.className = 'buildbar';
  barWrap.innerHTML = `<button class="buildbtn" disabled>Pick a few spots to build</button>`;
  picker.bar = barWrap.querySelector('.buildbtn');
  picker.bar.onclick = buildItinerary;
  wrap.appendChild(barWrap);
  thread.appendChild(wrap); scrollDown();
}

async function buildItinerary(){
  const sels = [...picker.sel.values()]; if (!sels.length) return;
  const c = picker.ctx, loc = picker.loc;
  picker.bar.disabled = true; picker.bar.textContent = 'Building…';
  try{
    const res = await fetch(`${API}/plan/build`, { method:'POST',
      headers:{'Content-Type':'application/json', ...authHeaders()},
      body: JSON.stringify({ selections:sels, lat:loc.lat, lng:loc.lng, party_size:c.party_size||2,
        budget:c.budget||0, vibe:c.vibe||'romantic', interests:c.interests||'', group_type:c.group_type||null,
        time_of_day:c.time_of_day||null, dietary:c.dietary||'' }) }).then(r=>r.json());
    if (res.type==='itinerary' && res.plan){ addMsg('assistant', esc(res.message||'Here\'s your itinerary:')); renderPlan(res.plan); }
    else addMsg('assistant', esc(res.message||'Could not build that.'));
  }catch(e){ addMsg('assistant','Snag building that — try again?'); }
  finally{ updateBuildBar(); }
}

async function fetchOptions(){
  try{
    const r = await fetch(`${API}/plan/options`, {
      method:'POST', headers:{'Content-Type':'application/json', ...authHeaders()},
      body: JSON.stringify({ messages, lat:userLoc&&userLoc.lat, lng:userLoc&&userLoc.lng })
    });
    if (r.status === 401){ typing(false); requireSignIn(); return; }
    const res = await r.json();
    typing(false);
    if (!res.ok){ addMsg('assistant', esc(res.message||'Turn on location or name a city, and I\'ll pull spots near you.')); return; }
    addMsg('assistant', "Here are the best spots near you 👇 tap the ones you're feeling, then build your itinerary. ✨");
    renderPicker(res);
  }catch(e){ typing(false); addMsg('assistant','Hmm, I hit a snag reaching the planner. Try again?'); }
}

function requireSignIn(){
  // Session expired mid-chat — a soft inline nudge (not a hard redirect) so the
  // conversation already on screen isn't lost.
  addMsg('assistant', "Looks like you got signed out — sign back in and I'll pick up right where we left off. 🧭");
  appendFoot([{ label:'🔑 Sign in / create account', onclick:()=>location.href='auth.html?redirect=roamly.html' }]);
}

async function send(text, display, o={}){
  text = (text||'').trim(); if (!text) return;
  if (!token()){ requireSignIn(); return; }
  $('input').value=''; addMsg('user', esc(display || text));
  messages.push({role:'user', content:text});
  typing(true); $('send').disabled=true;
  try{
    const r = await fetch(`${API}/plan/chat`, { method:'POST',
      headers:{'Content-Type':'application/json', ...authHeaders()},
      body: JSON.stringify({ messages, lat:userLoc&&userLoc.lat, lng:userLoc&&userLoc.lng,
        exclude:[...seenVenues], seed: Math.floor(Math.random()*1e9),
        surprise: !!o.surprise }) });
    if (r.status === 401){ typing(false); $('send').disabled=false; requireSignIn(); return; }
    const res = await r.json();
    typing(false);
    const bot = res.message || '…';
    addMsgTyped(bot); messages.push({role:'assistant', content:bot});
    if (res.type==='itinerary' && res.days && res.days.length) renderTrip(res.days, res.title);
    else if (res.type==='itinerary' && res.plan) renderPlan(res.plan);      // auto-generated, with images
    else addQuick(res.quick_replies);                                        // LLM's follow-up question
  }catch(e){ typing(false); addMsg('assistant','Hmm, I hit a snag reaching the planner. Try again?'); }
  finally{ $('send').disabled=false; $('input').focus(); }
}

$('send').onclick = ()=>send($('input').value);
$('input').addEventListener('keydown', e=>{ if(e.key==='Enter') send($('input').value); });
window.send = send;

  { key:'crew',   q:"What are we planning? 🎉", chips:[
      ['💘 Date night','date'],['🎉 With the crew','friends'],['🧍 Solo trip','solo'],['👨‍👩‍👧 Family day','family']] },
  { key:'vibe',   q:"Love it — what's the mood?", chips:[
      ['😌 Chill','chill'],['🎊 Fun & social','night_out'],['🤠 Adventurous','adventurous'],['🥂 Fancy','extravagant']] },
  { key:'energy', q:"How wild are we going?", chips:[
      ['🌙 Low-key','low'],['⚖️ Balanced','mid'],['🚀 Send it','high']] },
  { key:'budget', q:"Nice. What's the budget?", chips:[
      ['$50','50'],['$100','100'],['$200','200'],['💸 No cap','500']] },
  { key:'time',   q:"Last one — when's this happening?", chips:[
      ['🌆 Tonight','evening'],['🌤️ Afternoon','afternoon'],['☀️ Full day','morning']] },
];
let wiz = { i:0, ans:{}, active:false, chipsEl:null };

function startWizard(){
  addMsg('assistant', "Hey, I'm <b>Roamly</b> 🧭 — tell me what you're planning and I'll build it. A date night? A solo adventure? A day out with the crew? Just say the word (a budget helps too!).");
  addQuick(['💘 Plan a date night','🧍 Solo adventure','🎉 Day out with friends','👨‍👩‍👧 Family day out','🎲 Surprise me']);
}
function askStep(){
  const step = WIZ[wiz.i];
  addMsg('assistant', step.q);
  const row = document.createElement('div'); row.className = 'quick';
  step.chips.forEach(([label,val]) => {
    const b = document.createElement('button'); b.className='chip'; b.textContent=label;
    b.onclick = () => answerStep(step.key, val, label);
    row.appendChild(b);
  });
  thread.appendChild(row); scrollDown();
  wiz.chipsEl = row;
}
function answerStep(key, val, label){
  if (wiz.chipsEl){ wiz.chipsEl.remove(); wiz.chipsEl = null; }
  addMsg('user', esc(label));
  wiz.ans[key] = val; wiz.i++;
  if (wiz.i < WIZ.length) askStep();
  else { wiz.active = false; messages.push({role:'user', content:wizToPrompt(wiz.ans)}); typing(true); fetchOptions(); }
}
function wizToPrompt(a){
  const crew = {date:'date night', friends:'day with the crew', solo:'solo day', family:'family day'}[a.crew] || 'day out';
  const vibe = {chill:'chill', night_out:'fun social', adventurous:'adventurous', extravagant:'fancy'}[a.vibe] || '';
  const energy = {low:'relaxed low-key', mid:'', high:'thrilling wild exciting send it'}[a.energy] || '';
  const when = a.time === 'morning' ? 'full day' : (a.time === 'afternoon' ? 'this afternoon' : '');
  const per = (a.crew === 'friends' || a.crew === 'family') ? ' each' : '';
  return `${vibe} ${crew} ${when}, ${energy}, $${a.budget}${per}`.replace(/\s+/g,' ').replace(/ ,/g,',').trim();
}

/* ---------- boot ---------- */
// No session at all → straight to the dedicated sign-in/create-account page
// instead of dropping an unauthenticated visitor into the chat log.
if (!token()){
  location.replace('auth.html?redirect=' + encodeURIComponent('roamly.html' + location.search));
} else {
  getLoc();
  $('savedCount').textContent = getSaved().length;
  startWizard();
}
</script>
