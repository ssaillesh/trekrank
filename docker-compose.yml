# Full stack via Docker (requires Docker Desktop / Colima).
# On this machine Docker is not installed, so see backend/run_local.sh for the
# native (no-Docker) path. This compose file matches the production-ish topology.
version: "3.8"

services:
  api:
    build: ./backend
    command: bash -c "alembic upgrade head && python -m scripts.seed_badges && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports: ["8000:8000"]
    environment:
      DATABASE_URL: postgresql+psycopg2://trek:trek@db:5432/trekrank
      REDIS_URL: redis://redis:6379/0
      STORAGE_BACKEND: s3
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: trekrank-photos
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      JWT_SECRET: dev-secret-change-me
      PUBLIC_BASE_URL: http://localhost:8000
    depends_on: [db, redis, minio]

  worker:
    build: ./backend
    command: celery -A app.workers worker -l info -c 4
    environment:
      DATABASE_URL: postgresql+psycopg2://trek:trek@db:5432/trekrank
      REDIS_URL: redis://redis:6379/0
      STORAGE_BACKEND: s3
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: trekrank-photos
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
    depends_on: [db, redis, minio]

  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: trek
      POSTGRES_PASSWORD: trek
      POSTGRES_DB: trekrank
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports: ["9000:9000", "9001:9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes: ["miniodata:/data"]

  prometheus:
    image: prom/prometheus
    ports: ["9090:9090"]
    volumes: ["./infra/prometheus.yml:/etc/prometheus/prometheus.yml"]

  grafana:
    image: grafana/grafana
    ports: ["3000:3000"]
    environment:
      # Dev convenience only — anonymous viewer access, no auth. Do not use this
      # compose file as-is for anything internet-facing.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - "./infra/grafana/provisioning:/etc/grafana/provisioning"
    depends_on: [prometheus]

volumes:
  pgdata:
  miniodata:
